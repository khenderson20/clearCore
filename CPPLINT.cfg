# cpplint configuration for clearCore.
# Aligns cpplint with the project's established conventions (see .clang-format).

# Match .clang-format ColumnLimit.
linelength=100

# Filters: suppress checks that conflict with project conventions.
filter=-legal/copyright
filter=-build/namespaces
filter=-whitespace/indent_namespace
filter=-whitespace/indent
filter=-build/include_order
filter=-readability/check
# clang-format canonicalises value-init as `Type{}` (no space); cpplint wants
# a space before {. Suppress the conflict — clang-format is authoritative.
filter=-whitespace/braces
