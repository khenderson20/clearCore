# Pre-commit hooks — one-time setup per clone:
#   pipx install pre-commit    (or: pip install --user pre-commit)
#   pre-commit install
# After that, clang-format auto-fixes staged C++ files on every commit,
# using the same .clang-format as the editors and CI.
#
# clang-tidy is intentionally not hooked here: it needs a configured build
# (compile_commands.json) and is too slow per-commit. Run it via the preset
# builds or your IDE instead; .clang-tidy is picked up automatically.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/cpp-linter/cpp-linter-hooks
    rev: v1.5.0
    hooks:
      - id: clang-format
        args: [ --version=22 ]  # keep in sync with the version pinned in ci.yml
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1  # keep in sync with GITLEAKS_VERSION in gitleaks.yml
    hooks:
      - id: gitleaks
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: cpplint
  - repo: https://github.com/pylint-dev/pylint
    rev: v4.0.6
    hooks:
      - id: pylint
