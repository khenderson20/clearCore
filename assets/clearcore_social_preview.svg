  <!-- CP0 / exceptions + hex memory strip -->
  <text x="772" y="345" font-size="11" letter-spacing="1" class="gray">MEMORY  0x8000_0180</text>
  <rect x="772" y="352" width="314" height="16" fill="none" stroke="#2A2C34"/>
