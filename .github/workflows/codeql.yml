# CodeQL security scanning for the C++ code.
#
# Manual build mode: CodeQL only sees code that actually compiles, so we build
# the release preset with both Qt6 GUIs to cover all first-party code.
# Nyxstone stays off — it is third-party and just pulls in LLVM.
#
# Deliberately no ccache here: cache hits skip compilation and with it the
# CodeQL extractor, leaving those files out of the analysis.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '30 6 * * 1'  # weekly, Monday 06:30 UTC

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install dependencies
        run: >
          sudo apt-get update && sudo apt-get install -y
          ninja-build qt6-base-dev qt6-base-private-dev qt6-declarative-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: c-cpp
          build-mode: manual
          config: |
            paths-ignore:
              - build/**  # FetchContent third-party sources

      - name: Build
        run: |
          cmake --preset release -DBUILD_NYXSTONE=OFF
          cmake --build --preset release

      - name: Analyze
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: '/language:c-cpp'
