# CodeQL security scanning for the C++ code.
#
# Manual build mode: CodeQL only sees code that actually compiles, so we build
# the release preset with both Qt6 GUIs to cover all first-party code.
# Nyxstone stays off — it is third-party and just pulls in LLVM.
#
# Deliberately no ccache here: cache hits skip compilation and with it the
# CodeQL extractor, leaving those files out of the analysis.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 6 * * 1'  # weekly, Monday 06:30 UTC

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: >
          sudo apt-get update && sudo apt-get install -y
          ninja-build qt6-base-dev qt6-declarative-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: manual
          config: |
            paths-ignore:
              - build/**  # FetchContent third-party sources

      - name: Build
        run: |
          cmake --preset release -DBUILD_NYXSTONE=OFF
          cmake --build --preset release

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:c-cpp'
