# ClusterFuzzLite corpus pruning.
#
# cflite_batch.yml accumulates redundant testcases in the corpus over time
# (inputs that don't add new coverage). Mandatory companion to batch fuzzing
# per ClusterFuzzLite's own guidance: prune daily to keep the corpus lean and
# fuzzing efficient. Runs against the same `cifuzz-corpus` branch batch
# fuzzing writes to.
name: ClusterFuzzLite corpus pruning

on:
  schedule:
    - cron: '0 4 * * *'  # nightly, after cflite_batch.yml's 03:00 UTC run
  workflow_dispatch: { }

permissions:
  contents: read

concurrency:
  group: cflite-corpus-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the pruned corpus back to cifuzz-corpus
      security-events: write # SARIF upload to code scanning
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          use-policy-store: true
          api-key: ${{ secrets.STEP_SECURITY_API_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build Fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: c++

      - name: Run Fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 600
          mode: 'prune'
          output-sarif: true
          storage-repo: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          storage-repo-branch: cifuzz-corpus

      - name: Upload crash SARIF
        if: always() && steps.build.outcome == 'success'
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: cifuzz-sarif/results.sarif
          checkout_path: cifuzz-sarif
