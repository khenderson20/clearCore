# ClusterFuzzLite batch fuzzing.
#
# cflite_pr.yml only fuzzes code touched by a PR for 120s — bugs only surface
# if a PR happens to touch the exact vulnerable path. This runs the existing
# fuzz targets (tests/fuzz/) for much longer on a schedule, against the
# current develop HEAD, so bugs pre-existing in the MIPS decoder/parser get
# found even when no PR exercises them, and builds up a corpus for
# cflite_pr.yml / cflite_cov.yml to reuse.
#
# Corpus storage: pushed to the `cifuzz-corpus` branch of this same repo
# (rather than a separate storage repo) using the job's own GITHUB_TOKEN, so
# no extra PAT/secret is needed. That branch carries no source code and isn't
# covered by the main/develop branch rulesets, so direct pushes are fine.
name: ClusterFuzzLite batch fuzzing

on:
  schedule:
    - cron: '0 3 * * *'  # nightly, 03:00 UTC
  workflow_dispatch: { }

permissions:
  contents: read

concurrency:
  group: cflite-corpus-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the updated corpus to cifuzz-corpus
      security-events: write # SARIF upload to code scanning
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          use-policy-store: true
          api-key: ${{ secrets.STEP_SECURITY_API_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build Fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: c++

      - name: Run Fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 3600
          mode: 'batch'
          output-sarif: true
          storage-repo: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          storage-repo-branch: cifuzz-corpus

      # run_fuzzers only writes the SARIF file; it doesn't upload it. Without
      # this step security-events:write above is requested but never used.
      - name: Upload crash SARIF
        if: always() && steps.build.outcome == 'success'
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: cifuzz-sarif/results.sarif
          checkout_path: cifuzz-sarif
