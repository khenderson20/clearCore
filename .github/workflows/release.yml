# clearCore release artifacts.
#
# Builds a full Release (TUI + both Qt6 GUIs) and packages it with CPack, then
# attaches the resulting .tar.gz to the GitHub release that triggered the run.
#
# Trigger: publishing a GitHub release (the release-drafter draft, once you hit
# "Publish"). This is the same event that fires the GitHub->Zenodo archive, so
# a published release gets both a DOI and downloadable binaries. Also runnable
# manually via workflow_dispatch to smoke-test packaging without a release.
#
# NOTE: the .tar.gz contains clearCore's binaries but assumes Qt6 is present on
# the user's system. A self-contained AppImage (bundling Qt) is a planned
# follow-up layered on the same CPack install rules.
name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

# Read-only by default; the packaging job elevates to contents: write only to
# upload release assets.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # upload assets to the release
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          use-policy-store: true
          api-key: ${{ secrets.STEP_SECURITY_API_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: >
          sudo apt-get update && sudo apt-get install -y
          ninja-build qt6-base-dev qt6-base-private-dev qt6-declarative-dev
          llvm-dev zlib1g-dev
          xvfb libgl1-mesa-dev libglx-dev libxcb-cursor0

      - name: Install KSyntaxHighlighting (optional)
        run: sudo apt-get install -y libkf6syntaxhighlighting-dev || true

      - name: Configure (Release, all UIs)
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      # Gate the artifacts on a passing test run so we never publish a broken
      # binary. qt_ui_test uses Qt's offscreen platform (set in CMake).
      - name: Test
        run: ctest --test-dir build/release --output-on-failure

      - name: Package (CPack)
        id: package
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_EVENT_RELEASE_TAG_NAME}"
            VERSION="${VERSION#v}"          # strip leading 'v' (v0.0.2 -> 0.0.2)
          else
            VERSION="0.0.0-dev"
          fi
          echo "Packaging clearCore $VERSION"
          # CMake bakes CPACK_PACKAGE_FILE_NAME into CPackConfig.cmake as a
          # literal, so overriding CPACK_PACKAGE_VERSION alone won't rename the
          # archive — set the file name explicitly (with arch) as well.
          cpack --config build/release/CPackConfig.cmake -G TGZ \
                -D CPACK_PACKAGE_VERSION="$VERSION" \
                -D CPACK_PACKAGE_FILE_NAME="clearCore-${VERSION}-Linux-x86_64" \
                -B "${{ github.workspace }}/dist"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          ls -la "${{ github.workspace }}/dist"/*.tar.gz
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}

      # Inventories what actually ships: the built binaries and every bundled
      # shared library (Qt, QADS, ...) under build/release, via syft's binary
      # cataloger. A source-only scan would find little — this is a C++/CMake
      # project with no package-manifest lockfile for syft to read.
      - name: Generate SBOM
        uses: step-security/sbom-action@441a6c842e49122eed5d694f983ce4acae259c99 # v0.24.0
        with:
          path: build/release
          format: spdx-json
          artifact-name: clearcore-${{ steps.package.outputs.version }}.spdx.json
          upload-release-assets: ${{ github.event_name == 'release' }}

      - name: Upload workflow artifact (always)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clearCore-linux-${{ steps.package.outputs.version }}
          path: dist/*.tar.gz
          if-no-files-found: error

      # Launch both binaries from the *extracted package* — not the build tree —
      # so runtime breakage that only appears in the shipped layout fails the
      # release instead of reaching users. Runs after the artifact upload (so a
      # broken build is still downloadable for debugging) but before the release
      # attach, so broken binaries are never published. Regression guard for two
      # v0.2.0 bugs: clearCore-gui shipped with no RUNPATH to bundled
      # libqtadvanceddocking (unresolved only from the installed layout), and an
      # -O3-only out-of-bounds write that segfaulted the TUI on launch.
      - name: Smoke-test packaged binaries
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          tar -xzf "${{ github.workspace }}"/dist/*.tar.gz -C "$workdir"
          root="$(cd "$(dirname "$(find "$workdir" -type f -name number_system_converter)")/.." && pwd)"
          echo "Package root: $root"; find "$root" -maxdepth 2 -type f | sort

          fail=0

          # 1) Every dynamic dependency must resolve from the packaged layout —
          #    catches a missing or wrong RPATH to a bundled shared library.
          for bin in "$root"/bin/*; do
            echo "── ldd $(basename "$bin") ──"
            if ldd "$bin" 2>&1 | tee /tmp/ldd.txt | grep -i 'not found'; then
              echo "::error::$(basename "$bin") has unresolved shared libraries"
              fail=1
            fi
          done

          # 2) Each binary must survive launch (the -O3 TUI bug crashed during
          #    startup, before any input). Run with a timeout: a crash exits
          #    128+signal; a timeout (124) or clean exit is healthy.
          #
          #    The TUI needs no display and runs under the offscreen platform.
          #    clearCore-gui embeds a QOpenGLWidget, which the offscreen plugin
          #    cannot back ("QOpenGLWidget is not supported on this platform" ->
          #    segfault) — software-GL env vars don't help, since offscreen has
          #    no GL integration at all. Launch it under Xvfb (a virtual X server)
          #    with Mesa's software GL instead — the same approach the AppImage
          #    job uses to launch this exact binary successfully.
          smoke() {
            local bin="$1"; shift
            local rc=0
            if [ "$(basename "$bin")" = "clearCore-gui" ]; then
              xvfb-run -a --server-args="-screen 0 1280x1024x24" \
                timeout -s TERM 15s "$bin" "$@" </dev/null >/tmp/run.log 2>&1 || rc=$?
            else
              QT_QPA_PLATFORM=offscreen \
              timeout -s TERM 15s "$bin" "$@" </dev/null >/tmp/run.log 2>&1 || rc=$?
            fi
            if [ "$rc" -ge 128 ] && [ "$rc" -ne 124 ]; then
              echo "::error::$(basename "$bin") crashed on launch (signal $((rc - 128)))"
              cat /tmp/run.log || true
              return 1
            fi
            echo "✓ $(basename "$bin") launched without crashing (exit $rc)"
          }
          smoke "$root/bin/number_system_converter" || fail=1
          smoke "$root/bin/clearCore-gui"           || fail=1

          exit "$fail"

      - name: Attach to the GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "${GITHUB_EVENT_RELEASE_TAG_NAME}" \
            dist/*.tar.gz --clobber --repo "${{ github.repository }}"
