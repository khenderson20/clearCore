name: Release Drafter

on:
  push:
    branches:
      - main
  # NOTE: release-drafter needs write permissions; running on fork PRs will fail due to read-only tokens.
  # The push-to-main trigger below updates the draft release after merge, so a PR trigger is unnecessary.

permissions:
  contents: read

jobs:
  update-release-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          use-policy-store: true
          api-key: ${{ secrets.STEP_SECURITY_API_KEY }}

      - uses: step-security/release-drafter@54428085d555996f90aa466f2bea75c620e9aa46 # v7.5.1
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
