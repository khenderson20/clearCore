name: Update CHANGELOG on release

# Triggers when a GitHub Release is published (not a draft).
# Converts the [Unreleased] section in CHANGELOG.md to the released version,
# inserts a fresh [Unreleased] header, and commits back to develop.

on:
  release:
    types: [published]

permissions: read-all

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Promote [Unreleased] to versioned entry
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
        run: |
          python3 - <<'EOF'
          import os, re

          tag_raw = os.environ["RELEASE_TAG"]
          tag     = tag_raw[1:] if tag_raw.startswith("v") else tag_raw  # v0.1.0 -> 0.1.0
          date    = os.environ["RELEASE_DATE"][:10]                     # YYYY-MM-DD

          with open("CHANGELOG.md") as f:
              content = f.read()

          # Rename the current [Unreleased] heading to the released version and add a
          # fresh, empty [Unreleased] above it. The existing Unreleased content stays
          # in place and becomes the body of the released entry.
          new_section = (
              "## [Unreleased]\n\n"
              "---\n\n"
              f"## [{tag}] - {date}"
          )
          updated, n = re.subn(r"## \[Unreleased\]", new_section, content, count=1)
          if n == 0:
              raise SystemExit("error: no '## [Unreleased]' section found in CHANGELOG.md")

          with open("CHANGELOG.md", "w") as f:
              f.write(updated)
          print(f"Promoted [Unreleased] -> [{tag}] - {date}")
          EOF

      - name: Commit and push to develop
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: promote [Unreleased] to ${{ github.event.release.tag_name }} in CHANGELOG"
          git push origin develop
